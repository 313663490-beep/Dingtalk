name: 每日健康热搜汇总播报

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests

      - name: 生成日汇总并推送
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOKS: "${{ secrets.DINGTALK_WEBHOOK }},${{ secrets.DINGTALK_WEBHOOK_GROUP2 }}"
          DINGTALK_SECRETS: "${{ secrets.DINGTALK_SECRET }},${{ secrets.DINGTALK_SECRET_GROUP2 }}"
          DAILY_FILE: daily_health_topics.json
        run: python scripts/weibo_daily_summary.py

      - name: 提交清空后的累积文件
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add daily_health_topics.json
          git diff --staged --quiet || git commit -m "日汇总后清空累积 [skip ci]"
          git push
