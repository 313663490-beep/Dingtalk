name: 微博理财热搜定时播报

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finance-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests

      - name: 执行理财热搜脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK_FINANCE: ${{ secrets.DINGTALK_WEBHOOK_FINANCE }}
          DINGTALK_SECRET_FINANCE: ${{ secrets.DINGTALK_SECRET_FINANCE }}
        run: python scripts/weibo_finance_ai.py

      - name: 提交去重状态
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "更新理财去重状态 [skip ci]"
          git pull --rebase origin main
          git push
