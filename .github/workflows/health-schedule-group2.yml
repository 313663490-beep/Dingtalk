name: 微博健康热搜定时播报-群2

on:
  workflow_dispatch:          # 允许手动触发

jobs:
  health-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests

      # 恢复群2的去重缓存（独立 key）
      - name: 恢复去重缓存
        uses: actions/cache@v4
        with:
          path: sent_topics.json
          key: sent-topics-group2-Linux
          restore-keys: sent-topics-group2-Linux

      # 执行脚本（使用群2的钉钉凭证）
      - name: 执行抓取与总结脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK_GROUP2 }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET_GROUP2 }}
        run: python scripts/weibo_health_ai.py

      # 保存群2的去重缓存
      - name: 保存去重缓存
        if: success()
        uses: actions/cache@v4
        with:
          path: sent_topics.json
          key: sent-topics-group2-Linux
