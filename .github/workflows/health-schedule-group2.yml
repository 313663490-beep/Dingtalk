name: 微博健康热搜定时播报-群2

on:
  workflow_dispatch:          # 手动触发

jobs:
  health-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests

      - name: 执行抓取与总结脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK_GROUP2 }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET_GROUP2 }}
          SENT_TOPICS_FILE: sent_topics_group2.json   # 群2专用去重文件
        run: python scripts/weibo_health_ai.py

      - name: 提交去重状态
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_topics_group2.json
          git diff --staged --quiet || git commit -m "更新群2去重状态 [skip ci]"
          git push
