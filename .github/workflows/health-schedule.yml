name: 微博健康热搜定时播报

on:
  schedule:
    - cron: '*/20 * * * *'   # 每20分钟一次，测试完毕后可按需调整
  workflow_dispatch:          # 允许手动触发

jobs:
  health-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests

      # 1. 尝试下载上次保存的去重状态文件
      - name: 下载去重状态
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: sent-topics
          path: .

      # 2. 运行主脚本（内部会读取/写入 sent_topics.json）
      - name: 执行抓取与总结脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python scripts/weibo_health_ai.py

      # 3. 上传更新后的去重状态文件（保存 7 天，避免占用空间）
      - name: 上传去重状态
        uses: actions/upload-artifact@v4
        with:
          name: sent-topics
          path: sent_topics.json
          retention-days: 7
