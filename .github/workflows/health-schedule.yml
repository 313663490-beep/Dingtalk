name: 微博健康热搜定时播报

on:
  schedule:
    - cron: '*/20 * * * *'   # 可自行调整频率
  workflow_dispatch:          # 手动触发

jobs:
  health-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests

      # 1. 恢复上次保存的已发送列表（固定 key）
      - name: 恢复去重缓存
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: sent_topics.json
          key: sent-topics-cache
          restore-keys: sent-topics-cache

      # 2. 运行脚本
      - name: 执行抓取与总结脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python scripts/weibo_health_ai.py

      # 3. 保存更新后的已发送列表（使用完全相同的固定 key）
      - name: 保存去重缓存
        if: success()
        uses: actions/cache@v4
        with:
          path: sent_topics.json
          key: sent-topics-cache
