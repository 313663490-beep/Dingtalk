name: 小红书健康帖采集

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests

      - name: 搜索并筛选健康帖
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          UAPIS_API_KEY: ${{ secrets.UAPIS_API_KEY }}   # 添加这一行
          XHS_KEYWORDS: ${{ secrets.XHS_KEYWORDS }}
          RUN_MODE: collect
        run: python scripts/xiaohongshu_health_monitor.py

      - name: 提交状态文件
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xhs_last_capture.json xhs_pending.json
          git diff --staged --quiet || git commit -m "更新小红书采集状态 [skip ci]"
          git pull --rebase origin main
          git push
