name: 小红书健康帖汇总推送

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests

      - name: 推送待发帖到钉钉
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK_XHS: ${{ secrets.DINGTALK_WEBHOOK_XHS }}
          DINGTALK_SECRET_XHS: ${{ secrets.DINGTALK_SECRET_XHS }}
          XHS_KEYWORDS: ${{ secrets.XHS_KEYWORDS }}
          RUN_MODE: summary
        run: python scripts/xiaohongshu_health_monitor.py

      - name: 提交状态文件
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xhs_pending.json xhs_sent.json
          git diff --staged --quiet || git commit -m "推送后更新小红书状态 [skip ci]"
          git pull --rebase origin main
          git push
